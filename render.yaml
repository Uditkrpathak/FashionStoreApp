services:
  # 🔌 Public API Gateway
  - type: web
    name: fashion-gateway
    env: node
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: node gateway/server.js
    envVars:
      - key: JWT_SECRET
        value: supersecret
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: fashion-auth-service
          property: url
      - key: CATALOG_SERVICE_URL
        fromService:
          type: web
          name: fashion-catalog-service
          property: url
      - key: CART_SERVICE_URL
        fromService:
          type: web
          name: fashion-cart-service
          property: url
      - key: ORDER_SERVICE_URL
        fromService:
          type: web
          name: fashion-order-service
          property: url

  # 🔒 Auth & Profile Microservice (Web Service for Free Plan)
  - type: web
    name: fashion-auth-service
    env: node
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: node auth-service/server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: supersecret
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # 🛍️ Catalog Microservice (Web Service for Free Plan)
  - type: web
    name: fashion-catalog-service
    env: node
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: node catalog-service/server.js
    envVars:
      - key: MONGO_URI
        sync: false

  # 🛒 Cart Microservice (Web Service for Free Plan)
  - type: web
    name: fashion-cart-service
    env: node
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: node cart-service/server.js
    envVars:
      - key: MONGO_URI
        sync: false

  # 📦 Order & Payment Microservice (Web Service for Free Plan)
  - type: web
    name: fashion-order-service
    env: node
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: node order-service/server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: fashion-auth-service
          property: hostport
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
